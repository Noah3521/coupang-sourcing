# Add this block to ~/.hermes/config.yaml (merge under the existing top-level `mcp_servers:`
# key — create it if absent). Replace <YOU> with your macOS username / actual paths.
#
# After editing, restart the agent. Tools appear as mcp_coupang_find_products, etc.

mcp_servers:
  coupang:
    # Run the server from THIS project's venv so it has its dependencies.
    command: "/Users/<YOU>/coupang-sourcing/.venv/bin/python"
    args: ["-m", "coupang_sourcing.mcp_server"]
    env:
      COUPANG_SOURCING_DB: "/Users/<YOU>/.coupang-sourcing/sourcing.db"
      COUPANG_MAX_REVIEW_PAGES: "3"        # reviews per product on collection (0 = all)
      # COUPANG_CHROME: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
      # COUPANG_NODE: "/Users/<YOU>/.nvm/versions/node/v25.9.0/bin/node"
    timeout: 300          # full-collection tool calls can take a while
    connect_timeout: 60
